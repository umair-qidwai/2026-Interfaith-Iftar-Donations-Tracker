<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Impact Dashboard</title>
  <!-- Favicon from myprojectusa.org -->
  <!-- Use local logo for favicon -->
  <link rel="icon" type="image/png" href="MYP Logo.png">
  <style>
    :root {
      --bg: #fff;
      --text: #222;
      --muted: #666;
      --ringbg: #e0e0e0;
      --accent: #2e7d32;
      --card-bg: #f8f9fa;
      --card-border: #e0e0e0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1500px;
      margin: 0 auto;
      padding: 28px 24px 48px;
    }
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: .2px;
      color: var(--accent);
    }
    .subtitle {
      color: var(--muted);
      font-size: 14px;
    }
    .grid {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 16px;
    }
    .contentRow {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 24px;
      align-items: stretch;
    }
    .leftPanel {
      min-width: 0;
    }
    .qrPanel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      height: 100%;
    }
    .qrList {
      display: grid;
      gap: 14px;
    }
    .qrItem {
      background: #fff;
      border: 1px solid #e6e6e6;
      border-radius: 14px;
      padding: 10px;
      text-align: center;
    }
    .qrItem img {
      width: 100%;
      max-width: 160px;
      height: auto;
      display: block;
      margin: 0 auto 8px;
      border-radius: 10px;
    }
    .qrLabel {
      font-size: 14px;
      font-weight: 600;
      color: #111;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 18px 16px 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .label {
      font-weight: 650;
      letter-spacing: .2px;
      color: var(--accent);
    }
    .meta {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .dialRow {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 14px;
      align-items: center;
      margin-top: 12px;
    }
    .dial {
      width: 140px;
      height: 140px;
      display: block;
    }
    .big {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.1;
      color: var(--accent);
    }
    .small {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .smallSubtle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }
    .bar {
      height: 10px;
      border-radius: 999px;
      background: #e0e0e0;
      overflow: hidden;
      margin-top: 10px;
    }
    .bar>div {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 600ms ease;
    }
    .error {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #ffeaea;
      border: 1px solid #ffbdbd;
      color: #d32f2f;
      display: none;
      white-space: pre-wrap;
    }
    footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
    }
    code {
      background: #f1f1f1;
      padding: 2px 6px;
      border-radius: 6px;
    }
    header img {
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      border: 1px solid #e0e0e0;
      padding: 4px;
      border-radius: 12px;
      height: 48px;
      width: auto;
      margin-right: 10px;
      object-fit: contain;
    }
    @media (max-width: 980px) {
      .contentRow {
        grid-template-columns: 1fr;
      }
      .grid {
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      .qrList {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .grid { margin-top: 0; }
    }
    @media (max-width: 700px) {
      .qrList {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="contentRow">
      <div class="leftPanel">
        <img src="2026 Interfaith Iftar Banner.png" alt="2026 Interfaith Iftar Banner" style="width:100%;display:block;margin:0 auto 18px auto;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08);object-fit:cover;">
        <header>
          <h1 style="text-align:center;width:100%;color:#000">Our Collective Impact Tonight!</h1>
        </header>
        <div class="grid" id="grid"></div>
        <div class="error" id="err"></div>
      </div>

      <aside class="qrPanel" aria-label="QR Codes">
        <div class="qrList">
          <div class="qrItem">
            <img src="2026-Interfaith-Iftar-Donation-qr-code.png" alt="Donation QR Code">
            <div class="qrLabel">Donate Now</div>
          </div>
          <div class="qrItem">
            <img src="2026-Interfaith-Iftar-Donation-Pledge-qr-code.png" alt="Donation Pledge QR Code">
            <div class="qrLabel">Pledge Donation</div>
          </div>
          <div class="qrItem">
            <img src="2026-Interfaith-Iftar-Volunteer-Pledge-qr-code.png" alt="Volunteer Pledge QR Code">
            <div class="qrLabel">Pledge Volunteer Hours</div>
          </div>
        </div>
      </aside>
    </div>

  </div>

  <script>
    // 1) Paste your full n8n webhook URL here
    const API_URL = "https://n8n.umairqidwai.com/webhook/80ed8d7d-215c-49b1-9722-c472ef3817a3";

    // 2) Set your goals here (manual)
    const GOALS = {
      yearDonations: 25000,
      allTimeDonations: 100000,
      volunteerHours: 1500,
    };

    function clamp01(x){ return Math.max(0, Math.min(1, x)); }

    function money(n){
      const v = Number(n || 0);
      return v.toLocaleString(undefined, { style:"currency", currency:"USD", maximumFractionDigits:0 });
    }
    function number(n){
      return Number(n || 0).toLocaleString();
    }

    function dialSVG(pct, centerText){
      const r = 46;
      const c = 2 * Math.PI * r;
      const dash = c * pct;
      return `
        <svg class="dial" viewBox="0 0 120 120" aria-hidden="true">
          <circle cx="60" cy="60" r="${r}" fill="none" stroke="var(--ringbg)" stroke-width="12"></circle>
          <circle cx="60" cy="60" r="${r}" fill="none"
            stroke="rgba(255,255,255,0.9)" stroke-width="12" stroke-linecap="round"
            stroke-dasharray="${dash} ${c - dash}"
            transform="rotate(-90 60 60)"></circle>
          <text x="60" y="66" text-anchor="middle" font-size="18" font-weight="800" fill="var(--text)">${centerText}</text>
        </svg>
      `;
    }

    function cardHTML(title, valueText, goalText, pct, extraText = ""){
      const pctText = `${Math.round(pct * 100)}%`;
      return `
        <div class="card">
          <div class="top">
            <div class="label">${title}</div>
            <div class="meta">${pctText} of goal</div>
          </div>
          <div class="dialRow">
            ${dialSVG(pct, pctText)}
            <div>
              <div class="big">${valueText}</div>
              ${extraText ? `<div class="smallSubtle">${extraText}</div>` : ""}
              <div class="small">Goal: ${goalText}</div>
              <div class="bar"><div style="width:${Math.round(pct * 100)}%"></div></div>
            </div>
          </div>
        </div>
      `;
    }

    function showError(msg){
      const el = document.getElementById("err");
      el.style.display = "block";
      el.textContent = msg;
    }

    async function load(){
      if (!API_URL || API_URL.includes("PASTE_")) {
        showError("Set API_URL at the top of the HTML file.");
        return;
      }

      let data;
      try {
        const res = await fetch(API_URL, { method: "GET" });
        data = await res.json();
      } catch (e) {
        showError("Could not fetch the API URL.\n\n" + String(e));
        return;
      }

      if (!Array.isArray(data) || !data[0]) {
        showError("API did not return an array with at least 1 object.\nReceived:\n" + JSON.stringify(data, null, 2));
        return;
      }

      const row = data[0];

      // Pull your exact keys from the API response
      const yearTotal = Number(row["2026 Donations Total"] || 0);
      const allTimeTotal = Number(row["All year Donations Total"] || 0);
      const volunteerHours = Number(row["2026 Volunteer hours pledged"] || 0);
      const volunteerDollarAmount = Number(row["2026 hours pledged $ Amount"] || 0);

      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      // Card 1: Year donations
      {
        const pct = GOALS.yearDonations > 0 ? clamp01(yearTotal / GOALS.yearDonations) : 0;
        grid.insertAdjacentHTML("beforeend",
          cardHTML("Donated This Year", money(yearTotal), money(GOALS.yearDonations), pct)
        );
      }

      // Card 2: All-time donations
      {
        const pct = GOALS.allTimeDonations > 0 ? clamp01(allTimeTotal / GOALS.allTimeDonations) : 0;
        grid.insertAdjacentHTML("beforeend",
          cardHTML("Donated All-Time", money(allTimeTotal), money(GOALS.allTimeDonations), pct)
        );
      }

      // Card 3: Volunteer hours
      {
        const pct = GOALS.volunteerHours > 0 ? clamp01(volunteerDollarAmount / GOALS.volunteerHours) : 0;
        grid.insertAdjacentHTML("beforeend",
          cardHTML(
            "Volunteer Hours",
            money(volunteerDollarAmount),
            money(GOALS.volunteerHours),
            pct,
            `(${number(volunteerHours)} hours)`
          )
        );
      }
    }

    load();
      // Auto-refresh every 10 seconds:
      setInterval(load, 10000);
  </script>
</body>
</html>
